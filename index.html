

<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

 <style>
body{
  margin:0;
}

/* AR scene starts invisible */
a-scene{
  opacity:0;
  transition:opacity 1.2s ease;
}

/* visible state */
a-scene.visible{
  opacity:1;
}

#startButton{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:16px 26px;
  font-size:18px;
  z-index:10;

  transition:opacity 0.8s ease;
}

/* button fade out */
#startButton.fade{
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<button id="startButton">Tap to Start AR</button>

<a-scene
  mindar-image="imageTargetSrc: https://raw.githubusercontent.com/gabibranche/landandlineage/main/women.mind;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-assets>
  <!-- Single audio element -->
  <audio id="mainAudio" preload="auto" playsinline></audio>
</a-assets>

<!-- TARGETS -->
<a-entity id="target0" mindar-image-target="targetIndex: 0"></a-entity>
<a-entity id="target1" mindar-image-target="targetIndex: 1"></a-entity>
<a-entity id="target2" mindar-image-target="targetIndex: 2"></a-entity>
<a-entity id="target3" mindar-image-target="targetIndex: 3"></a-entity>
<a-entity id="target4" mindar-image-target="targetIndex: 4"></a-entity>
<a-entity id="target5" mindar-image-target="targetIndex: 5"></a-entity>

</a-scene>

<script>

// AUDIO FILES
const audioFiles = [
  "https://gabibranche.github.io/landandlineage/barbara.mp3",
  "https://gabibranche.github.io/landandlineage/gabi.mp3",
  "https://gabibranche.github.io/landandlineage/julia.mp3",
  "https://gabibranche.github.io/landandlineage/lisa.mp3",
  "https://gabibranche.github.io/landandlineage/mary.mp3",
  "https://gabibranche.github.io/landandlineage/ursula.mp3"
];

const mainAudio = document.querySelector("#mainAudio");


// START BUTTON (required for iPhone audio unlock)
document.querySelector("#startButton").addEventListener("click", async () => {

  try {
    mainAudio.muted = true;

    mainAudio.src = "";
    await mainAudio.play().catch(()=>{});

    mainAudio.pause();
    mainAudio.currentTime = 0;
    mainAudio.muted = false;

  } catch(e) {
    console.log("audio unlock failed", e);
  }

  // fade button out
  const button = document.querySelector("#startButton");
  button.classList.add("fade");

  // fade AR scene in
  const scene = document.querySelector("a-scene");
  scene.classList.add("visible");

  // remove button after animation
  setTimeout(()=>{
    button.remove();
  },800);

});


// TARGET AUDIO FUNCTION
function setupTarget(targetId, index){

  const target = document.querySelector(targetId);

  target.addEventListener("targetFound", () => {

    mainAudio.pause();
    mainAudio.currentTime = 0;

    mainAudio.src = audioFiles[index];

    mainAudio.play().catch(e => console.log("play blocked", e));
  });

  target.addEventListener("targetLost", () => {
    mainAudio.pause();
    mainAudio.currentTime = 0;
  });

}


// CONNECT TARGETS
setupTarget("#target0",0);
setupTarget("#target1",1);
setupTarget("#target2",2);
setupTarget("#target3",3);
setupTarget("#target4",4);
setupTarget("#target5",5);

</script>

</body>
</html>
